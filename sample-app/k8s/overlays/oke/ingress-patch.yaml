apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: book-app-ingress
  namespace: book-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: null
    oci-native-ingress.oraclecloud.com/backend-tls-enabled: "false"
    oci-native-ingress.oraclecloud.com/healthcheck-path: "/health"
    oci-native-ingress.oraclecloud.com/healthcheck-protocol: "HTTP"
    oci-native-ingress.oraclecloud.com/https-listener-port: "443"
spec:
  ingressClassName: mcp-ingress-class
  tls:
    - hosts:
        - book-app.sogawa-yk.com
      secretName: wildcard-tls-secret
  rules:
    - host: book-app.sogawa-yk.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
