# OpenTelemetry Collector Helm values
# helm install otel-collector open-telemetry/opentelemetry-collector \
#   -n book-observability --create-namespace -f values.yaml

mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      send_batch_size: 1024
      timeout: 5s
      send_batch_max_size: 2048
    memory_limiter:
      check_interval: 5s
      limit_mib: 512
      spike_limit_mib: 128

  exporters:
    otlp/jaeger:
      endpoint: jaeger-collector.book-observability:4317
      tls:
        insecure: true
    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp/jaeger
          - debug
      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - debug
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - debug

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
