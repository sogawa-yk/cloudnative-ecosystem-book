apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: book-app
  namespace: book-app
spec:
  hosts:
    - "book-app.example.com"
  gateways:
    - book-app-gateway
  http:
    - match:
        - uri:
            prefix: /api
      route:
        - destination:
            host: api-gateway
            port:
              number: 8080
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure
      timeout: 10s
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: frontend
            port:
              number: 80
