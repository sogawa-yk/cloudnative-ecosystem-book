apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: book-app-developer-binding
  namespace: book-app
subjects:
  - kind: Group
    name: book-app-developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: book-app-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: book-app-deployer-binding
  namespace: book-app
subjects:
  - kind: ServiceAccount
    name: book-app-deployer
    namespace: book-app
roleRef:
  kind: Role
  name: book-app-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: book-app-cluster-viewer-binding
subjects:
  - kind: Group
    name: book-app-developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: book-app-cluster-viewer
  apiGroup: rbac.authorization.k8s.io
