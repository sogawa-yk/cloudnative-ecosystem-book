apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: falco-system
  labels:
    app: falco
data:
  book-app-rules.yaml: |-
    # Custom Falco rules for book-app

    - rule: Shell Spawned in Book App Container
      desc: Detect shell being spawned inside book-app containers
      condition: >
        spawned_process and container and
        k8s.ns.name = "book-app" and
        proc.name in (bash, sh, zsh, dash, csh, ksh)
      output: >
        Shell spawned in book-app container
        (user=%user.name shell=%proc.name container=%container.name
        namespace=%k8s.ns.name pod=%k8s.pod.name image=%container.image.repository)
      priority: WARNING
      tags: [book-app, shell, mitre_execution]

    - rule: Sensitive File Access in Book App
      desc: Detect access to sensitive files in book-app containers
      condition: >
        open_read and container and
        k8s.ns.name = "book-app" and
        (fd.name startswith /etc/shadow or
         fd.name startswith /etc/passwd or
         fd.name startswith /proc/self/environ)
      output: >
        Sensitive file accessed in book-app container
        (user=%user.name file=%fd.name container=%container.name
        namespace=%k8s.ns.name pod=%k8s.pod.name)
      priority: ERROR
      tags: [book-app, filesystem, mitre_credential_access]

    - rule: Outbound Connection from Product Service
      desc: Detect unexpected outbound connections from product-service
      condition: >
        outbound and container and
        k8s.ns.name = "book-app" and
        k8s.deployment.name = "product-service" and
        not (fd.sip.name = "postgres" or
             fd.sport in (53, 5432, 8080, 8081, 4317))
      output: >
        Unexpected outbound connection from product-service
        (command=%proc.cmdline connection=%fd.name
        namespace=%k8s.ns.name pod=%k8s.pod.name)
      priority: NOTICE
      tags: [book-app, network, mitre_exfiltration]

    - rule: Package Manager Execution in Book App
      desc: Detect package manager execution in running book-app containers
      condition: >
        spawned_process and container and
        k8s.ns.name = "book-app" and
        proc.name in (apt, apt-get, yum, dnf, apk, pip, npm)
      output: >
        Package manager executed in running container
        (user=%user.name command=%proc.cmdline container=%container.name
        namespace=%k8s.ns.name pod=%k8s.pod.name)
      priority: ERROR
      tags: [book-app, package, mitre_persistence]

    - rule: Database Credential File Modified
      desc: Detect modification of database credential files
      condition: >
        open_write and container and
        k8s.ns.name = "book-app" and
        (fd.name contains "database" or
         fd.name contains ".env" or
         fd.name contains "credentials")
      output: >
        Database credential file modified
        (user=%user.name file=%fd.name container=%container.name
        namespace=%k8s.ns.name pod=%k8s.pod.name)
      priority: ERROR
      tags: [book-app, credentials, mitre_credential_access]
