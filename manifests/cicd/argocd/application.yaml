apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: book-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cloudnative-book/cloudnative-ecosystem-book.git
    targetRevision: main
    path: sample-app/k8s/overlays/oke
  destination:
    server: https://kubernetes.default.svc
    namespace: book-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
