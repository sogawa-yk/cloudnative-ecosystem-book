apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: cloud-native-microservice
  title: Cloud Native Microservice
  description: Create a new microservice for the book-app ecosystem
  tags:
    - python
    - kubernetes
    - cloud-native
spec:
  owner: team-cloudnative
  type: service

  parameters:
    - title: Service Information
      required:
        - serviceName
        - description
        - owner
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name of the microservice
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of the service
        owner:
          title: Owner
          type: string
          description: Owner team
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: Technical Configuration
      required:
        - port
        - database
      properties:
        port:
          title: Service Port
          type: number
          default: 8080
          description: Port the service listens on
        database:
          title: Database Required
          type: boolean
          default: true
          description: Whether the service needs a database
        language:
          title: Language
          type: string
          default: python
          enum:
            - python
            - go
            - java
          enumNames:
            - Python
            - Go
            - Java

    - title: Deployment Configuration
      properties:
        replicas:
          title: Replicas
          type: number
          default: 2
          description: Number of replicas
        namespace:
          title: Namespace
          type: string
          default: book-app
          description: Kubernetes namespace

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          database: ${{ parameters.database }}
          replicas: ${{ parameters.replicas }}
          namespace: ${{ parameters.namespace }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        repoUrl: github.com?owner=cloudnative-book&repo=${{ parameters.serviceName }}
        description: ${{ parameters.description }}
        defaultBranch: main
        protectDefaultBranch: true

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
